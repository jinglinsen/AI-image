# ================================================
# AIGC 图片生成助手 - Docker Compose 编排
# 包含: Nginx + Flask Backend + MySQL
# ================================================

services:
  # ============ MySQL 数据库 ============
  db:
    image: mysql:8.0
    container_name: aigc-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-aigc_root_2026}
      MYSQL_DATABASE: aigc_assistant
      MYSQL_USER: aigc_user
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-aigc_pass_2026}
      TZ: Asia/Shanghai
    ports:
      # 仅绑定本地，不暴露到公网
      - "127.0.0.1:3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./deploy/mysql-init:/docker-entrypoint-initdb.d
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
      --max-connections=200
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-aigc_root_2026}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - aigc-network

  # ============ Flask 后端 ============
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aigc-backend
    restart: always
    environment:
      # Flask 配置
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production-2026}
      FLASK_DEBUG: "False"
      HOST: "0.0.0.0"
      PORT: "5000"

      # 数据库（指向 Docker 内部 MySQL 容器）
      DATABASE_URL: mysql+pymysql://aigc_user:${MYSQL_PASSWORD:-aigc_pass_2026}@db:3306/aigc_assistant?charset=utf8mb4

      # DMX API 配置
      API_BASE_URL: ${API_BASE_URL:-https://www.dmxapi.cn/v1}
      API_KEY: ${API_KEY}

      # 模型配置
      FAST_MODEL_NAME: ${FAST_MODEL_NAME:-dall-e-3}
      VISION_MODEL_NAME: ${VISION_MODEL_NAME:-dall-e-3}
      MAX_INPUT_IMAGES: "10"
      DEFAULT_QUALITY: "85"
      API_TIMEOUT: "120"

      # 成本控制
      MAX_DAILY_REQUESTS: "1000"
      COST_ALERT_THRESHOLD: "100.0"

      # 日志
      LOG_LEVEL: "INFO"

      # OSS
      OSS_ENABLED: ${OSS_ENABLED:-False}
      OSS_ACCESS_ID: ${OSS_ACCESS_ID:-}
      OSS_ACCESS_KEY: ${OSS_ACCESS_KEY:-}
      OSS_ENDPOINT: ${OSS_ENDPOINT:-}
      OSS_BUCKET: ${OSS_BUCKET:-}

      TZ: Asia/Shanghai
    volumes:
      # 持久化数据
      - backend_uploads:/app/uploads
      - backend_images:/app/generated_images
      - backend_logs:/app/logs
      - backend_instance:/app/instance
    depends_on:
      db:
        condition: service_healthy
    networks:
      - aigc-network

  # ============ Nginx 前端 + 反向代理 ============
  nginx:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aigc-nginx
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - aigc-network

# ============ 数据卷 ============
volumes:
  mysql_data:
    driver: local
  backend_uploads:
    driver: local
  backend_images:
    driver: local
  backend_logs:
    driver: local
  backend_instance:
    driver: local

# ============ 网络 ============
networks:
  aigc-network:
    driver: bridge
